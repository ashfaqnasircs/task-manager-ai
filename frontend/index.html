<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    background: #f5f5f5;
    color: #222;
  }
  h1 { font-size: 22px; margin-bottom: 20px; }
  form {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  ul { list-style: none; padding: 0; }
  li {
    background: white;
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .empty { color: #888; font-size: 14px; }
</style>
</head>
<body>

<h1>Task Manager</h1>

<form id="task-form">
  <input type="text" id="task-title" placeholder="Add a new task..." required>
  <button type="submit">Add</button>
</form>

<ul id="task-list"></ul>

<script>
  const API_URL = 'http://localhost:3000/tasks';

  const form = document.getElementById('task-form');
  const input = document.getElementById('task-title');
  const list = document.getElementById('task-list');

  async function loadTasks() {
    try {
      const res = await fetch(API_URL);
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (err) {
      list.innerHTML = '<li class="empty">Could not load tasks. Is the API running?</li>';
    }
  }

  function renderTasks(tasks) {
    list.innerHTML = '';
    if (tasks.length === 0) {
      list.innerHTML = '<li class="empty">No tasks yet.</li>';
      return;
    }
    tasks.forEach(task => {
      const li = document.createElement('li');
      li.textContent = task.title;
      list.appendChild(li);
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = input.value.trim();
    if (!title) return;

    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTasks();
    } catch (err) {
      alert('Failed to add task. Is the API running?');
    }
  });

  loadTasks();
</script>

</body>
</html>
